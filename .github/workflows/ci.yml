name: CI Syntax Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-syntax:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check JavaScript Syntax
      run: node --check static/app.js

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Compile Python Files
      run: python -m py_compile main.py models.py
